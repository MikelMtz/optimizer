dataset:
  name: mnist
  mnistcifar:
    num_classes: 2
    classes: "0,7"
model:
  arch: mlp
  mlp:
    hidden_units: 64    # overridden by CLI
    layers: 1
  model_count_times_batch_size: 1600000
  normalization: lipschitz
  init: uniform         # overridden by CLI
optimizer:
  name: guess
distributed:
  loss_thres: "-999,999"
  data_seed: 0
  training_seed: 0
  target_model_count_subrun: 500 # Old 500000
  num_samples: "16"
output:
  folder: output/mnist_mlp/placeholder   # overridden by CLI
  target_model_count: 500  # Old 500000
