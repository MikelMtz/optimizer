dataset:
  name: kink
  kink:
    margin: 0.25
    noise: 0.0
model:
  arch: lenet
  lenet:
    width: 0.5          # overridden by CLI
  model_count_times_batch_size: 160000
  init: uniform         # overridden by CLI
optimizer:
  name: guess
distributed:
  loss_thres: "-999,999"
  data_seed: 0
  training_seed: 0
  target_model_count_subrun: 50000
  num_samples: "16"
output:
  folder: output/kink_lenet/placeholder   # overridden by CLI
  target_model_count: 50000
