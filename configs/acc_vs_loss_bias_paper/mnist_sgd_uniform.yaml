output:
  folder: output/acc_vs_loss/mnist_sgd_uniform
  target_model_count: 2000
dataset:
  name: mnist
  mnistcifar:
    num_classes: 2
    classes: "0,7"
model:
  arch: lenet
  lenet:
    width: 0.5
  model_count_times_batch_size: 10000 # Was 60000 (OOM on 12GB GPU with 30k models); 10000/2=5000 models fits
  normalization: lipschitz
  init: uniform
optimizer:
  name: SGD
  lr: 0.01
  epochs: 60
  batch_size: 2
  es_acc: 1.0
distributed:
  loss_thres: "-999,999"
  num_samples: "16"
  data_seed: 0
  target_model_count_subrun: 10
